<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Internal Management Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            padding: 10px;
        }
        
        h1 {
            text-align: center;
            margin: 15px 0;
            font-size: 20px;
        }
        
        /* 电脑端布局：两列 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .module {
            border: 1px solid #000;
            background: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }
        
        .module h2 {
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        
        /* 搜索框美化 */
        .search-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        input {
            flex: 1;
            padding: 10px;
            font-size: 16px; /* 关键：防止移动端缩放 */
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        button {
            padding: 10px 15px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #searchResult {
            background: #f1f1f1;
            padding: 10px;
            font-size: 14px;
            white-space: pre-wrap;
            border-radius: 4px;
        }

        .module-content {
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        /* --- 核心修复：移动端适配 --- */
        @media (max-width: 768px) {
            .grid-container {
                display: block; /* 手机端放弃 Grid，改用块级排列 */
            }
            
            .module {
                width: 100%;
                margin-bottom: 15px; /* 每个模块之间留空 */
                height: auto;
                min-height: unset;
            }

            .search-group {
                flex-direction: column; /* 手机上搜索框和按钮垂直排布 */
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Internal Management Portal</h1>
    
    <div class="grid-container">
        <div class="module">
            <h2>📢 模块 2：留言板</h2>
            <div class="module-content" id="notifications">正在加载公告...</div>
        </div>

        <div class="module">
            <h2>🔍 模块 1：价格查询</h2>
            <div class="search-group">
                <input type="text" id="productCode" placeholder="输入编号">
                <button onclick="searchProduct()">查询</button>
            </div>
            <div id="searchResult">等待输入...</div>
        </div>
        
        <div class="module">
            <h2>⚠️ 模块 3：缺货清单</h2>
            <div class="module-content" id="outOfStock">正在统计...</div>
        </div>
        
        <div class="module">
            <h2>⚙️ 模块 4：预留</h2>
            <div class="module-content" id="reserved">（暂时空白）</div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
