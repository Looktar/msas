<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Management Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            grid-template-areas: 
                "module1 module2"
                "module3 module4";
            gap: 20px;
            height: calc(100vh - 100px);
        }
        
        .module {
            border: 1px solid #000;
            padding: 15px;
            overflow: auto;
        }
        
        .module h2 {
            font-size: 16px;
            margin-bottom: 10px;
            border-bottom: 1px solid #000;
            padding-bottom: 5px;
        }
        
        .module-content {
            font-size: 14px;
            line-height: 1.5;
        }
        
        input {
            padding: 8px;
            font-size: 14px;
            border: 1px solid #000;
        }
        
        button {
            padding: 8px 16px;
            font-size: 14px;
            border: 1px solid #000;
            background: #fff;
            cursor: pointer;
            margin-left: 10px;
        }
        
        button:hover {
            background: #f0f0f0;
        }
        
        #searchResult {
            margin-top: 10px;
            white-space: pre-wrap;
        }
        
        #notifications, #outOfStock, #reserved {
            white-space: pre-wrap;
        }
        
        /* 模块 4 预留保持空白 */
        #reserved {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
            }
        }
    </style>
</head>
<body>
    <h1>Internal Management Portal</h1>
    
    <div class="grid-container">
        <div class="module" style="grid-area: module1;">
            <h2>模块 1：价格查询</h2>
            <div class="module-content">
                <input type="text" id="productCode" placeholder="输入产品代码 (如：PROD001)">
                <button onclick="searchProduct()">查询价格</button>
                <div id="searchResult"></div>
            </div>
        </div>
        
        <div class="module" style="grid-area: module2;">
            <h2>模块 2：留言板</h2>
            <div class="module-content" id="notifications"></div>
        </div>
        
        <div class="module" style="grid-area: module3;">
            <h2>模块 3：缺货清单</h2>
            <div class="module-content" id="outOfStock"></div>
        </div>
        
        <div class="module" style="grid-area: module4;">
            <h2>模块 4：预留</h2>
            <div class="module-content" id="reserved">预留模块（暂时空白）</div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
